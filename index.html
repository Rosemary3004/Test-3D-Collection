<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Rosemary3004 </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
    <img src="logo.png" alt="Mushroom Studio Logo" class="logo" />
    <div class="main-title">Rosemary</div>
    <div class="sub-title">Test3Dcollection(AR)</div>
  </header>

  <!-- Nerd -->
  <div class="ar-section">
    <div class="head-title">Mingpu</div>
    <div class="sub-title">just a test model that I download</div>
    <model-viewer id="model1"
      src="Avatar.glb"
      ios-src="Avatar.usdz"
      ar
      ar-modes="scene-viewer webxr quick-look"
      camera-controls
      autoplay
      auto-rotate
      shadow-intensity="1"
      shadow-softness="1"
      environment-image="neutral.hdr"
      loading="eager"
      reveal="auto"
      style="width: 100%; height: 400px;">
    </model-viewer>
    <button class="ar-button" onclick="triggerAR('model1')">Play AR</button>
  </div>

<footer>
<div class="footer-link"><strong>Facebook:</strong> <a href="https://www.facebook.com/RxRosemary3004/" target="_blank">facebook.com/RxRosemary3004/</a></div>


<!-- ✅ โหลด model-viewer หลังสุดเพื่อให้โหลดหน้าเว็บเร็วขึ้น -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<!-- ✅ Script ปุ่ม Play AR พร้อม catch error -->
<script>
   function triggerAR(id) {
     const viewer = document.getElementById(id);
     if (viewer && viewer.activateAR) {
       viewer.activateAR().catch((error) => {
         alert("AR ไม่พร้อมบนอุปกรณ์นี้ หรือถูกบล็อกโดย browser\n(แนะนำให้กดปุ่ม AR บนมุมขวาของโมเดลแทน)");
         console.warn("activateAR failed:", error);
       });
     }
   }
</script>

</body>
</html>
