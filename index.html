<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IROSE</title>
 
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
 
<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>

<style>
 
body{
font-family:'Noto Sans Thai',sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}
 
/* Header */
 
header{
background:#CCFFFF;
color:#003333;
padding:30px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
 
.main-title{
font-size:28px;
font-weight:bold;
}
 
.sub-title{
font-size:16px;
color:#4D4D4D;
}
 
/* Section */
 
.ar-section{
max-width:700px;
margin:40px auto;
padding:25px;
background:white;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}
 
.head-title{
font-size:24px;
font-weight:bold;
margin-bottom:5px;
}
 
/* 3D Model */
 
model-viewer{
width:100%;
height:400px;
background:#eee;
border-radius:10px;
}
 
/* Button */
 
.ar-button{
margin-top:15px;
padding:12px 30px;
font-size:16px;
border:none;
border-radius:8px;
background:#ff4d4d;
color:white;
cursor:pointer;
}
 
.ar-button:hover{
background:#ff2222;
}
 
/* Footer */
 
footer{
margin-top:40px;
padding:25px;
background:#222;
color:white;
}
 
footer a{
color:#ff8080;
text-decoration:none;
}
  
</style>
 
</head>
 
<body>
 
<header>
<div class="main-title">My 3D Collection</div>
<div class="sub-title">3D Model (AR)</div>
</header>
 
 
<!-- CH1 -->
<section class="ar-section">
 
<div class="head-title">Just Dance</div>
<div class="sub-title">EIEI</div>
 
<model-viewer
id="model1"
src="Avatar.glb"
ios-src="Avatar.usdz"
ar
ar-modes="scene-viewer webxr quick-look"
camera-controls
auto-rotate
autoplay
animation-name="*"
shadow-intensity="1"
environment-image="neutral"
style="width:100%; height:400px;">
 
<button slot="ar-button" class="ar-button">
เปิด AR
</button>
 
</model-viewer>
 
<button class="ar-button" onclick="triggerAR('model1')">
Play AR
</button>
 
</section>

<section class="ar-section">
 
<div class="head-title">Room</div>
<div class="sub-title">Sleepy</div>
 
<model-viewer
id="model2"
src="room.glb"
ios-src="room.usdz"
ar
ar-modes="scene-viewer webxr quick-look"
camera-controls
auto-rotate
autoplay
animation-name="*"
shadow-intensity="1"
environment-image="neutral"
style="width:100%; height:400px;">
 
<button slot="ar-button" class="ar-button">
เปิด AR
</button>
 
</model-viewer>
 
<button class="ar-button" onclick="triggerAR('model2')">
Play AR
</button>
 
</section>

<section class="ar-section">
 
<div class="head-title">Donut</div>
<div class="sub-title">Yummy</div>
 
<model-viewer

 <!-- CH4 -->

เปิด AR

<footer>
 
<div class="footer-link">
<strong>Facebook:</strong>
<a href="https://www.facebook.com/RxRosemary3004/" target="_blank">
facebook.com/RxRosemary3004/
</a>
</div>
 
</footer>
 
 
<script>
 
function triggerAR(id) {
 
const viewer = document.getElementById(id);
 
if (!viewer) {
alert("ไม่พบโมเดล");
return;
}
 
if (viewer.canActivateAR) {
 
viewer.activateAR().catch((error)=>{
 
alert("AR ไม่พร้อมบนอุปกรณ์นี้\nแนะนำให้ใช้ Chrome Android หรือ Safari iPhone");
console.warn(error);
 
});
 
} else {
 
alert("อุปกรณ์นี้ไม่รองรับ AR");
 
}
 
}
 
</script>
 
</body>
</html>
