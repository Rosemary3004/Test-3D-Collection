<<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Rosemary3004</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet" />

<!-- โหลด model-viewer ก่อน -->
<script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
body {
  font-family: 'Noto Sans Thai', sans-serif;
  text-align: center;
}

.ar-section {
  margin-top: 20px;
}

.ar-button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>Rosemary</h1>
<h3>Test3Dcollection (AR)</h3>

<div class="ar-section">
  <h2>Mingpu</h2>
  <p>just a test model that I download</p>

  <model-viewer
      id="model1"
      src="./Avatar.glb"
      ar
      ar-modes="scene-viewer webxr quick-look"
      camera-controls
      auto-rotate
      exposure="1.2"
      shadow-intensity="1"
      style="width: 100%; height: 400px;">
  </model-viewer>

  <br><br>

  <button class="ar-button" onclick="triggerAR()">
    Play AR
  </button>
</div>

<footer>
  <p>
    <strong>Facebook:</strong>
    <a href="https://www.facebook.com/RxRosemary3004/" target="_blank">
      facebook.com/RxRosemary3004/
    </a>
  </p>
</footer>

<script>
function triggerAR() {
  const viewer = document.querySelector("#model1");
  if (viewer) {
    viewer.activateAR();
  }
}
</script>

</body>
</html>
